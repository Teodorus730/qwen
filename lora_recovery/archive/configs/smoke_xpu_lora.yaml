# End-to-end XPU smoke on 3-5 rows generated by qwen_continuation_dataset:
#   cd qwen_continuation_dataset
#   python generate_dataset.py --config config.yaml --dataset fineweb \
#     --mode fixed --max-examples 3 --prefix-tokens 32 --max-new-tokens 8 \
#     --output outputs/xpu_smoke.jsonl --overwrite --no-cycle-detection
#   cd ../lora_recovery
#   python -m src.distill --config configs/smoke_xpu_lora.yaml
model_name: Qwen/Qwen3-0.6B-Base
run_name: smoke_xpu_lora
out_dir: results
device: xpu

alpha: 0.01
noise_seed: 0
perturb_norms: false

local_jsonl: ../qwen_continuation_dataset/outputs/xpu_smoke.jsonl
seq_len: 32
min_score: 0.0
data_seed: 0
probe_skip_docs: 0
train_skip_docs: 0

mode: off_policy
divergence: forward_kl
temperature: 1.0
beta_start: 1.0
beta_end: 1.0

optimizer: adamw
grad_checkpointing: false
lora_r: 4
lora_alpha: 8
lora_dropout: 0.0
lora_target_modules: [q_proj, v_proj]
steps: 3
batch_size: 1
grad_accum: 1
lr: 1.0e-3
weight_decay: 0.0
warmup: 0
grad_clip: 1.0

eval_every: 3
eval_blocks: 3
probe_blocks: 3
cka_max_tokens: 64

save_student: false
max_seconds: 0
