# Safer version of the hard-teacher CE baseline for Windows/WDDM.
#
# Purpose: save final student checkpoints without pushing the RTX 3090 Ti into
# high VRAM / driver-pressure regimes that previously caused system freezes.
# It keeps the same effective batch per optimizer update:
#   old: batch_size 4 * grad_accum 2 = 8 blocks/update
#   safe: batch_size 2 * grad_accum 4 = 8 blocks/update
# and doubles micro-steps so the total number of training tokens stays similar:
#   old: 2000 * 4 * 256 tokens
#   safe: 4000 * 2 * 256 tokens
model_name: Qwen/Qwen3-0.6B-Base
run_name: a0.2
out_dir: results/qwen3_0.6b_alpha_sweep

alpha: 0.2
noise_seed: 0
perturb_norms: false

seq_len: 256
min_score: 2.5
data_seed: 0

distill_objective: hard_teacher_ce
mode: off_policy
on_policy_ratio: 0.0
on_policy_warmup_frac: 1.0
divergence: forward_kl
on_policy_divergence: reverse_kl
temperature: 1.0
jsd_beta: 0.5
beta_start: 1.0
beta_end: 1.0
beta_schedule: linear
rollout_min: 1
rollout_max: 1
rollout_prompt_len: 128
sample_temperature: 1.0

optimizer: adamw8bit
grad_checkpointing: false
steps: 4000
batch_size: 2
grad_accum: 4
lr: 5.0e-5
weight_decay: 0.01
warmup: 200
grad_clip: 1.0

eval_every: 500
eval_blocks: 64
probe_blocks: 16
cka_max_tokens: 16384

save_student: true
max_seconds: 0
