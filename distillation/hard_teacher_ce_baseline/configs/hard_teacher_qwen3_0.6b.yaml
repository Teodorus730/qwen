# Hard-teacher (T->0) baseline for the Qwen3-0.6B recovery experiment.
#
# This is NOT literal temperature: 0. The teacher distribution is collapsed to
# its argmax token at every position, and the student is trained with ordinary
# cross-entropy against those teacher top-1 targets.
#
# Results are written to a separate folder so they never mix with soft-KD runs:
#   results/qwen3_0.6b_alpha_sweep/<run_name>
model_name: Qwen/Qwen3-0.6B-Base
run_name: a0.2
out_dir: results/qwen3_0.6b_alpha_sweep

alpha: 0.2
noise_seed: 0
perturb_norms: false

seq_len: 256
min_score: 2.5
data_seed: 0

distill_objective: hard_teacher_ce
mode: off_policy
on_policy_ratio: 0.0
on_policy_warmup_frac: 1.0
divergence: forward_kl
on_policy_divergence: reverse_kl
temperature: 1.0
jsd_beta: 0.5
beta_start: 1.0
beta_end: 1.0
beta_schedule: linear
rollout_min: 1
rollout_max: 1
rollout_prompt_len: 128
sample_temperature: 1.0

optimizer: adamw8bit
grad_checkpointing: false
steps: 2000
batch_size: 4
grad_accum: 2
lr: 5.0e-5
weight_decay: 0.01
warmup: 100
grad_clip: 1.0

eval_every: 250
eval_blocks: 64
probe_blocks: 16
cka_max_tokens: 16384

save_student: true
max_seconds: 0
