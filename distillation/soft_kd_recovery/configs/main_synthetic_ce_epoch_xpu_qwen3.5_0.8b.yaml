# One autonomous LoRA epoch over all 1500 unique synthetic rows.
model_name: Qwen/Qwen3.5-0.8B-Base
run_name: main_synthetic_ce_epoch_xpu_qwen3.5_0.8b
out_dir: results
device: xpu

alpha: 0.05
noise_seed: 0
perturb_norms: false

local_jsonl: ../../qwen_continuation_dataset/outputs/qwen35_08b_fineweb_1500_seed42.jsonl
eval_jsonl: ../../qwen_continuation_dataset/outputs/qwen35_08b_fineweb_heldout_seed43.jsonl
probe_jsonl: ../../qwen_continuation_dataset/outputs/qwen35_08b_fineweb_heldout_seed43.jsonl
seq_len: 160
min_score: 0.0
data_seed: 42
eval_skip_docs: 0
probe_skip_docs: 16
train_skip_docs: 0
train_one_pass: true

objective: synthetic_ce
mode: off_policy

optimizer: adamw
grad_checkpointing: false
lora_r: 8
lora_alpha: 16
lora_dropout: 0.0
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - in_proj_qkv
  - in_proj_z
  - out_proj
  - gate_proj
  - up_proj
  - down_proj
# Replaced at runtime by the exact number of one-pass packed batches.
steps: 0
batch_size: 4
grad_accum: 1
lr: 5.0e-5
weight_decay: 0.0
warmup: 10
grad_clip: 1.0

eval_every: 500
eval_blocks: 8
probe_blocks: 8
cka_max_tokens: 512

save_student: false
max_seconds: 0
