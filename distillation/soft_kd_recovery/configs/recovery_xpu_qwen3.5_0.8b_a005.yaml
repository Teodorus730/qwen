# LoRA recovery on the existing 64-row XPU validation dataset.
model_name: Qwen/Qwen3.5-0.8B-Base
run_name: recovery_xpu_qwen3.5_0.8b_a005
out_dir: results
device: xpu

alpha: 0.05
noise_seed: 0
perturb_norms: false

local_jsonl: ../../qwen_continuation_dataset/outputs/xpu_validation.jsonl
seq_len: 64
min_score: 0.0
data_seed: 0
probe_skip_docs: 16
train_skip_docs: 32

mode: off_policy
divergence: forward_kl
temperature: 1.0
beta_start: 1.0
beta_end: 1.0

optimizer: adamw
grad_checkpointing: false
lora_r: 8
lora_alpha: 16
lora_dropout: 0.0
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - in_proj_qkv
  - in_proj_z
  - out_proj
  - gate_proj
  - up_proj
  - down_proj
steps: 120
batch_size: 1
grad_accum: 1
lr: 5.0e-5
weight_decay: 0.0
warmup: 10
grad_clip: 1.0

eval_every: 30
eval_blocks: 8
probe_blocks: 8
cka_max_tokens: 512

save_student: false
max_seconds: 0
