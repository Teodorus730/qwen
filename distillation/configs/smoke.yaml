# Smoke test on the newest small Qwen base model (Qwen3-0.6B-Base).
# CPU-feasible on a 16 GB-free box; more steps than the original smoke so the
# recovery curve is clearly visible. Real numbers still come from the 3090 Ti.
model_name: Qwen/Qwen3-0.6B-Base
run_name: smoke
out_dir: results

alpha: 0.2
noise_seed: 0
perturb_norms: false

seq_len: 256
min_score: 0.0

mode: off_policy        # cleanest, fastest recovery for a CPU smoke
on_policy_ratio: 0.5
on_policy_warmup_frac: 0.4
divergence: forward_kl
on_policy_divergence: reverse_kl
temperature: 1.0
beta_start: 1.0
beta_end: 0.5
beta_schedule: linear
rollout_min: 1
rollout_max: 5
rollout_prompt_len: 48
sample_temperature: 1.0

optimizer: adamw
grad_checkpointing: false
steps: 150
batch_size: 2
grad_accum: 1
lr: 7.0e-5
warmup: 10
grad_clip: 1.0

eval_every: 30
eval_blocks: 6
probe_blocks: 4
cka_max_tokens: 4096

save_student: false
max_seconds: 0
